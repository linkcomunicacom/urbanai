<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UrbanAI — Inteligencia Territorial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
/* ============================================================
   TOKENS
   ============================================================ */
:root {
  --bg:          #0b0f14;
  --bg2:         #111620;
  --bg3:         #181e2a;
  --border:      rgba(255,255,255,0.07);
  --border-act:  rgba(99,179,237,0.35);
  --text:        #e8ecf0;
  --muted:       #7a8899;
  --accent:      #63b3ed;
  --accent2:     #4a9fd6;
  --gold:        #e2b96a;
  --success:     #4caf82;
  --error:       #e05c5c;
  --user-bg:     #1a2640;
  --ai-bg:       #131920;
  --font-head:   'DM Serif Display', Georgia, serif;
  --font-body:   'DM Sans', system-ui, sans-serif;
  --radius:      12px;
  --radius-lg:   18px;
  --shadow:      0 4px 24px rgba(0,0,0,0.4);
}

/* ============================================================
   RESET
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.65;
  color: var(--text);
  background: var(--bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ============================================================
   HEADER
   ============================================================ */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  height: 58px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-mark {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--gold) 100%);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-head);
  font-size: 16px;
  color: var(--bg);
  font-weight: 400;
  flex-shrink: 0;
}

.logo-text {
  font-family: var(--font-head);
  font-size: 20px;
  color: var(--text);
  letter-spacing: -0.3px;
}

.logo-text span {
  color: var(--accent);
}

.header-meta {
  display: flex;
  align-items: center;
  gap: 8px;
}

.status-dot {
  width: 7px;
  height: 7px;
  background: var(--success);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--success);
  animation: pulse-dot 3s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.4; }
}

.status-label {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.5px;
}

.new-chat-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 5px 14px;
  border-radius: 8px;
  font-family: var(--font-body);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.3px;
}

.new-chat-btn:hover {
  border-color: var(--border-act);
  color: var(--accent);
}

/* ============================================================
   MAIN LAYOUT
   ============================================================ */
main {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* ============================================================
   CHAT AREA
   ============================================================ */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 28px 0 16px;
  scroll-behavior: smooth;
}

#chat::-webkit-scrollbar { width: 4px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ============================================================
   WELCOME SCREEN
   ============================================================ */
#welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100%;
  padding: 40px 24px;
  text-align: center;
  gap: 12px;
}

.welcome-icon {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--gold) 100%);
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-head);
  font-size: 28px;
  color: var(--bg);
  margin-bottom: 8px;
}

.welcome-title {
  font-family: var(--font-head);
  font-size: 32px;
  color: var(--text);
  letter-spacing: -0.5px;
}

.welcome-title em {
  font-style: italic;
  color: var(--accent);
}

.welcome-sub {
  font-size: 14px;
  color: var(--muted);
  max-width: 400px;
  line-height: 1.6;
}

.suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-top: 20px;
  max-width: 600px;
}

.suggestion-chip {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 8px 16px;
  border-radius: 100px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font-body);
  text-align: left;
  line-height: 1.4;
}

.suggestion-chip:hover {
  border-color: var(--border-act);
  color: var(--accent);
  background: rgba(99,179,237,0.05);
}

/* ============================================================
   MESSAGES
   ============================================================ */
.msg-row {
  display: flex;
  gap: 12px;
  padding: 8px 24px;
  max-width: 860px;
  margin: 0 auto;
  width: 100%;
  animation: fade-up 0.25s ease both;
}

@keyframes fade-up {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg-row.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  margin-top: 2px;
}

.msg-row.user   .msg-avatar { background: var(--user-bg); border: 1px solid rgba(99,179,237,0.2); }
.msg-row.ai     .msg-avatar { background: linear-gradient(135deg, var(--accent) 0%, var(--gold) 100%); color: var(--bg); font-family: var(--font-head); }
.msg-row.system .msg-avatar { background: var(--bg3); border: 1px solid var(--border); }

.msg-content {
  flex: 1;
  min-width: 0;
}

.msg-bubble {
  display: inline-block;
  max-width: 100%;
  padding: 12px 16px;
  border-radius: var(--radius-lg);
  font-size: 14.5px;
  line-height: 1.7;
  word-wrap: break-word;
}

.msg-row.user .msg-bubble {
  background: var(--user-bg);
  border: 1px solid rgba(99,179,237,0.15);
  border-radius: var(--radius-lg) var(--radius-lg) 4px var(--radius-lg);
  color: var(--text);
  display: block;
  text-align: left;
}

.msg-row.ai .msg-bubble {
  background: transparent;
  border-radius: 4px var(--radius-lg) var(--radius-lg) var(--radius-lg);
  color: var(--text);
  display: block;
  width: 100%;
}

.msg-row.system .msg-bubble {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 13px;
  border-radius: 10px;
  display: inline-block;
}

/* Markdown content inside AI bubbles */
.msg-bubble h1, .msg-bubble h2, .msg-bubble h3, .msg-bubble h4 {
  font-family: var(--font-head);
  color: var(--text);
  margin: 1.2em 0 0.4em;
  font-weight: 400;
  line-height: 1.3;
}

.msg-bubble h1 { font-size: 1.4em; }
.msg-bubble h2 { font-size: 1.2em; color: var(--accent); }
.msg-bubble h3 { font-size: 1.05em; color: var(--gold); }
.msg-bubble h4 { font-size: 0.95em; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

.msg-bubble p { margin-bottom: 0.7em; }
.msg-bubble p:last-child { margin-bottom: 0; }

.msg-bubble ul, .msg-bubble ol {
  margin: 0.5em 0 0.7em 1.4em;
}

.msg-bubble li { margin-bottom: 0.3em; }

.msg-bubble strong { color: var(--text); font-weight: 500; }
.msg-bubble em { color: var(--accent); font-style: italic; }

.msg-bubble code {
  background: rgba(99,179,237,0.1);
  border: 1px solid rgba(99,179,237,0.2);
  border-radius: 5px;
  padding: 1px 6px;
  font-size: 13px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  color: var(--accent);
}

.msg-bubble pre {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  overflow-x: auto;
  margin: 0.8em 0;
}

.msg-bubble pre code {
  background: none;
  border: none;
  padding: 0;
  color: var(--text);
  font-size: 13px;
}

.msg-bubble blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 12px;
  color: var(--muted);
  margin: 0.7em 0;
  font-style: italic;
}

.msg-bubble table {
  width: 100%;
  border-collapse: collapse;
  margin: 0.8em 0;
  font-size: 13.5px;
}

.msg-bubble th, .msg-bubble td {
  padding: 8px 12px;
  border: 1px solid var(--border);
  text-align: left;
}

.msg-bubble th {
  background: var(--bg3);
  color: var(--accent);
  font-weight: 500;
}

.msg-bubble tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

/* Cursor blink during streaming */
.msg-bubble.streaming::after {
  content: '▋';
  color: var(--accent);
  animation: blink 0.8s step-end infinite;
  margin-left: 1px;
  font-size: 0.9em;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0; }
}

/* ============================================================
   SOURCES
   ============================================================ */
.sources-row {
  max-width: 860px;
  margin: 0 auto;
  padding: 4px 24px 4px calc(24px + 32px + 12px);
  width: 100%;
}

.sources-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 6px;
}

.sources-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.source-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 4px 10px 4px 8px;
  font-size: 12px;
  color: var(--muted);
  text-decoration: none;
  transition: all 0.2s;
  max-width: 280px;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

.source-chip:hover {
  border-color: var(--border-act);
  color: var(--accent);
}

.source-chip::before {
  content: '↗';
  font-size: 10px;
  flex-shrink: 0;
  color: var(--accent);
}

/* ============================================================
   STATUS / TYPING
   ============================================================ */
.status-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 24px;
  max-width: 860px;
  margin: 0 auto;
  width: 100%;
}

.status-indicator {
  display: flex;
  gap: 4px;
  align-items: center;
}

.status-indicator span {
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  animation: wave 1.2s ease-in-out infinite;
}

.status-indicator span:nth-child(2) { animation-delay: 0.2s; }
.status-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes wave {
  0%, 100% { transform: translateY(0); opacity: 0.4; }
  50%       { transform: translateY(-4px); opacity: 1; }
}

.status-text {
  font-size: 13px;
  color: var(--muted);
  font-style: italic;
}

/* ============================================================
   INPUT AREA
   ============================================================ */
#input-area {
  flex-shrink: 0;
  background: var(--bg);
  border-top: 1px solid var(--border);
  padding: 16px 24px 20px;
}

.input-wrapper {
  max-width: 860px;
  margin: 0 auto;
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 10px 10px 10px 16px;
  transition: border-color 0.2s;
}

.input-wrapper:focus-within {
  border-color: var(--border-act);
}

#input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14.5px;
  line-height: 1.6;
  resize: none;
  min-height: 24px;
  max-height: 180px;
  overflow-y: auto;
}

#input::placeholder { color: var(--muted); }

#input::-webkit-scrollbar { width: 3px; }
#input::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.send-btn {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
  color: var(--bg);
}

.send-btn:hover { transform: scale(1.05); filter: brightness(1.1); }
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; filter: none; }

.send-btn svg { width: 16px; height: 16px; }

.input-footer {
  display: flex;
  justify-content: center;
  margin-top: 8px;
}

.input-footer-text {
  font-size: 11px;
  color: var(--muted);
  opacity: 0.6;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 640px) {
  header { padding: 0 16px; }
  .logo-text { display: none; }
  #chat { padding: 16px 0 8px; }
  .msg-row { padding: 6px 12px; }
  .sources-row { padding: 4px 12px 4px 56px; }
  .status-row { padding: 6px 12px; }
  #input-area { padding: 12px 12px 16px; }
  .welcome-title { font-size: 24px; }
  .suggestions { gap: 6px; }
}
</style>
</head>
<body>

<!-- =========================================================
     HEADER
     ========================================================= -->
<header>
  <div class="logo">
    <div class="logo-mark">U</div>
    <span class="logo-text">Urban<span>AI</span></span>
  </div>

  <div class="header-meta">
    <div class="status-dot"></div>
    <span class="status-label">SISTEMA ACTIVO</span>
  </div>

  <button class="new-chat-btn" onclick="newChat()">Nueva sesión</button>
</header>

<!-- =========================================================
     MAIN
     ========================================================= -->
<main>
  <div id="chat">
    <!-- Welcome screen -->
    <div id="welcome">
      <div class="welcome-icon">U</div>
      <h1 class="welcome-title">Urban<em>AI</em></h1>
      <p class="welcome-sub">Sistema de inteligencia territorial desarrollado por Link Comunica. Análisis de nivel decisional para gobiernos, municipios, desarrolladores e inversores.</p>

      <div class="suggestions">
        <button class="suggestion-chip" onclick="useSuggestion(this)">Estudio de viabilidad urbanística en Gorinchem</button>
        <button class="suggestion-chip" onclick="useSuggestion(this)">Análisis de mercado inmobiliario Santiago de Chile</button>
        <button class="suggestion-chip" onclick="useSuggestion(this)">Regulación de uso de suelo en municipio europeo</button>
        <button class="suggestion-chip" onclick="useSuggestion(this)">Plan de movilidad sostenible para ciudad intermedia</button>
        <button class="suggestion-chip" onclick="useSuggestion(this)">Criterios Wlz para vivienda accesible en Países Bajos</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div id="input-area">
    <div class="input-wrapper">
      <textarea
        id="input"
        placeholder="Haz tu consulta de inteligencia territorial..."
        rows="1"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Enviar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="input-footer">
      <span class="input-footer-text">UrbanAI por Link Comunica · urbanai.linkcomunica.com</span>
    </div>
  </div>
</main>

<script>
// =============================================================================
// UrbanAI Frontend — SSE Streaming Client
// =============================================================================

// Configure marked
marked.setOptions({
  breaks: true,
  gfm: true,
});

// State
let messages = [];
let isLoading = false;

// DOM refs
const chatEl   = document.getElementById('chat');
const inputEl  = document.getElementById('input');
const sendBtn  = document.getElementById('sendBtn');
const welcomeEl = document.getElementById('welcome');

// ---------------------------------------------------------------------------
// Auto-resize textarea
// ---------------------------------------------------------------------------
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + 'px';
});

// Enter to send (Shift+Enter for newline)
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!isLoading) sendMessage();
  }
});

// ---------------------------------------------------------------------------
// Suggestion chips
// ---------------------------------------------------------------------------
function useSuggestion(el) {
  inputEl.value = el.textContent.trim();
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + 'px';
  inputEl.focus();
}

// ---------------------------------------------------------------------------
// New chat
// ---------------------------------------------------------------------------
function newChat() {
  messages = [];
  chatEl.innerHTML = '';
  chatEl.appendChild(welcomeEl);
  welcomeEl.style.display = 'flex';
  inputEl.value = '';
  inputEl.style.height = 'auto';
  inputEl.focus();
}

// ---------------------------------------------------------------------------
// Append message row — returns the bubble element
// ---------------------------------------------------------------------------
function appendRow(role, htmlContent) {
  // Hide welcome on first message
  if (welcomeEl && welcomeEl.parentNode) {
    welcomeEl.style.display = 'none';
  }

  const avatarMap = { user: '👤', ai: 'U', system: '⚡' };

  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = avatarMap[role] || '?';

  const content = document.createElement('div');
  content.className = 'msg-content';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (htmlContent) bubble.innerHTML = htmlContent;

  content.appendChild(bubble);
  row.appendChild(avatar);
  row.appendChild(content);
  chatEl.appendChild(row);
  scrollToBottom();

  return { row, bubble };
}

// ---------------------------------------------------------------------------
// Status / typing indicator
// ---------------------------------------------------------------------------
let statusRowEl = null;

function showStatus(text) {
  removeStatus();
  statusRowEl = document.createElement('div');
  statusRowEl.className = 'status-row';
  statusRowEl.innerHTML = `
    <div class="status-indicator"><span></span><span></span><span></span></div>
    <span class="status-text">${escapeHtml(text)}</span>
  `;
  chatEl.appendChild(statusRowEl);
  scrollToBottom();
}

function updateStatus(text) {
  if (statusRowEl) {
    const st = statusRowEl.querySelector('.status-text');
    if (st) st.textContent = text;
  }
}

function removeStatus() {
  if (statusRowEl) {
    statusRowEl.remove();
    statusRowEl = null;
  }
}

// ---------------------------------------------------------------------------
// Sources row
// ---------------------------------------------------------------------------
let sourcesRowEl = null;
let sourcesListEl = null;

function ensureSourcesRow() {
  if (!sourcesRowEl) {
    sourcesRowEl = document.createElement('div');
    sourcesRowEl.className = 'sources-row';
    sourcesRowEl.innerHTML = '<div class="sources-label">Fuentes</div><div class="sources-list"></div>';
    chatEl.appendChild(sourcesRowEl);
    sourcesListEl = sourcesRowEl.querySelector('.sources-list');
  }
}

function addSource(title, url) {
  ensureSourcesRow();
  const chip = document.createElement('a');
  chip.className = 'source-chip';
  chip.href = url;
  chip.target = '_blank';
  chip.rel = 'noopener noreferrer';
  chip.title = title;
  chip.textContent = title.length > 40 ? title.slice(0, 40) + '…' : title;
  sourcesListEl.appendChild(chip);
}

// ---------------------------------------------------------------------------
// Scroll
// ---------------------------------------------------------------------------
function scrollToBottom() {
  chatEl.scrollTo({ top: chatEl.scrollHeight, behavior: 'smooth' });
}

// ---------------------------------------------------------------------------
// Escape HTML for safe injection
// ---------------------------------------------------------------------------
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ---------------------------------------------------------------------------
// Render markdown safely
// ---------------------------------------------------------------------------
function renderMarkdown(raw) {
  try {
    return marked.parse(raw || '');
  } catch {
    return escapeHtml(raw || '');
  }
}

// ---------------------------------------------------------------------------
// MAIN: Send message with SSE streaming
// ---------------------------------------------------------------------------
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;

  // Lock UI
  isLoading = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';

  // Reset sources state for this turn
  sourcesRowEl = null;
  sourcesListEl = null;

  // Add user message
  messages.push({ role: 'user', content: text });
  appendRow('user', escapeHtml(text));

  // Show status
  showStatus('Analizando consulta...');

  // AI bubble (will be filled as tokens arrive)
  const { bubble: aiBubble } = appendRow('ai', '');
  aiBubble.classList.add('streaming');
  let rawText = '';

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages }),
    });

    if (!res.ok) {
      // Try to read error
      let errMsg = `Error del servidor (${res.status})`;
      try {
        const errData = await res.json();
        errMsg = errData?.error || errMsg;
      } catch {}
      throw new Error(errMsg);
    }

    // Read SSE stream
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let sseBuffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      sseBuffer += decoder.decode(value, { stream: true });

      // Process complete SSE events (separated by \n\n)
      const events = sseBuffer.split('\n\n');
      sseBuffer = events.pop() || ''; // keep incomplete event in buffer

      for (const evt of events) {
        if (!evt.trim()) continue;

        const lines = evt.split('\n');
        let eventName = 'message';
        let dataStr = '';

        for (const line of lines) {
          if (line.startsWith('event: ')) eventName = line.slice(7).trim();
          if (line.startsWith('data: '))  dataStr   = line.slice(6).trim();
        }

        if (!dataStr) continue;

        let data;
        try { data = JSON.parse(dataStr); } catch { continue; }

        switch (eventName) {
          case 'status':
            updateStatus(data.message || '');
            break;

          case 'token':
            removeStatus(); // remove typing indicator once first token arrives
            rawText += data.text || '';
            // Render markdown incrementally
            aiBubble.innerHTML = renderMarkdown(rawText);
            scrollToBottom();
            break;

          case 'source':
            addSource(data.title || data.url, data.url);
            break;

          case 'done':
            // Finalize
            break;

          case 'error':
            throw new Error(data.message || 'Error desconocido del servidor');
        }
      }
    }

    // Finalize AI bubble
    aiBubble.classList.remove('streaming');
    if (!rawText) {
      aiBubble.innerHTML = '<em style="color:var(--muted)">Sin respuesta del sistema.</em>';
    } else {
      aiBubble.innerHTML = renderMarkdown(rawText);
      messages.push({ role: 'assistant', content: rawText });
    }

  } catch (err) {
    removeStatus();
    aiBubble.classList.remove('streaming');

    // Only show error if no content was received
    if (!rawText) {
      aiBubble.innerHTML = `<span style="color:var(--error)">⚠ ${escapeHtml(err.message || 'Error de conexión')}</span>`;
      // Remove the failed user message from history so user can retry
      if (messages.length > 0 && messages[messages.length - 1]?.role === 'user') {
        messages.pop();
      }
    } else {
      // Content arrived — don't show error, just finalize what we got
      aiBubble.innerHTML = renderMarkdown(rawText);
      messages.push({ role: 'assistant', content: rawText });
    }

    console.error('[UrbanAI] Error:', err);
  } finally {
    removeStatus();
    isLoading = false;
    sendBtn.disabled = false;
    inputEl.focus();
    scrollToBottom();
  }
}
</script>

</html>
